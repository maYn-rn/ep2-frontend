services:
  frontend:
    image: ${DOCKERHUB_USER}/isy1101-frontend:${TAG:-latest}
    container_name: ep2-frontend
    restart: unless-stopped
    ports:
      # nginx-unprivileged escucha en 8080 dentro del contenedor
      - "80:8080"
    environment:
      # URLs hacia la EC2 privada (backend). Debe ser la IP privada o DNS privado.
      VENTAS_URL: ${VENTAS_URL}
      DESPACHOS_URL: ${DESPACHOS_URL}

